<!DOCTYPE html>
<html>
<body>

<h2>Image Maps</h2>
<p>Click on the computer, the phone, or the cup of coffee:</p>

<!-- PRIMER MAPA -->
<img src="/images/w3schools.png" alt="W3Schools.com" usemap="#workmap1" width="400" height="379">

<map name="workmap1">
  <area shape="rect" coords="20,40,250,340" alt="Computer" href="w.htm">
  <area shape="rect" coords="270,150,350,260" alt="Phone" href="3.htm">
  <area shape="circle" coords="320,300,40" alt="Coffee" href="schools.htm">
</map>

<!-- SEGUNDO MAPA (POLYGON) -->
<img src="/images/w3schools.png" alt="W3Schools.com" usemap="#workmap2" width="400" height="379">

<map name="workmap2">
  <area shape="poly" coords="140,120,180,115,205,160,205,220,190,270,140,330,85,355,60,350,40,320,45,260,100,160,125,145" 
  href="school.htm">
</map>

<!-- TERCER MAPA (CON JS) -->
<img src="/images/w3schools.png" alt="W3Schools.com" usemap="#workmap3" width="400" height="379">

<map name="workmap3">
  <area shape="circle" coords="320,300,40" href="w.htm" onclick="myFunction()">
</map>

<script>
function myFunction() {
  alert("You clicked the coffee cup!");
}
</script>

</body>
</html>
