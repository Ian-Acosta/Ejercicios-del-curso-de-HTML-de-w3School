<!DOCTYPE html>
<html>
<body>

<h1>The HTML audio Element</h1>

<audio controls>
  <source src="/images/Dora.ogg" type="audio/ogg">
  <source src="/images/Dora.mp3" type="audio/mpeg">
</audio>

<br><br>

<h1>The HTML audio Autoplay</h1>

<audio controls autoplay>
  <source src="/images/Dora.ogg" type="audio/ogg">
  <source src="/images/Dora.mp3" type="audio/mpeg">
</audio>

<br><br>

<h1>The HTML audio Autoplay Muted</h1>

<audio controls autoplay muted>
  <source src="/images/Dora.ogg" type="audio/ogg">
  <source src="/images/Dora.mp3" type="audio/mpeg">
</audio>

</body>
</html>
